apiVersion: v1
kind: Pod
metadata:
  labels:
    app: spring-build-ci

spec:
  containers:
    - name: maven
      image: maven:alpine
      command:
        - cat
      tty: true
      volumeMounts:
        - name: m2
          mountPath: /root/.m2/

    - name: docker-tools
      image: mkanda/docker-tools:latest
      command:
        - cat
      tty: true
      volumeMounts:
        - name: docker-sock
          mountPath: /var/run
        - name: trivycache
          mountPath: /tmp/trivycache/

    - name: trufflehog
      image: mkanda/trufflehog
      command:
        - cat
      tty: true

    - name: licensefinder
      image: licensefinder/license_finder
      command:
        - cat
      tty: true

    - name: kaniko
      image: gcr.io/kaniko-project/executor:latest
      command:
        - cat
      tty: true
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker

  volumes:
    - name: m2
      hostPath:
        path: /tmp/.m2/

    - name: docker-sock
      hostPath:
        path: /var/run

    - name: trivycache
      hostPath:
        path: /tmp/trivycache/

    - name: docker-config
      secret:
        secretName: regcred
