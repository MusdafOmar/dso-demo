apiVersion: v1
kind: Pod
spec:
  containers:
    - name: maven
      image: maven:3.9-eclipse-temurin-17
      command:
        - cat
      tty: true

    - name: licensefinder
      image: licensefinder/license_finder
      command:
        - cat
      tty: true

    - name: kaniko
      image: gcr.io/kaniko-project/executor:debug
      command:
        - /busybox/cat
      tty: true
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker

    - name: slscan
      image: shiftleft/sast-scan
      command:
        - cat
      tty: true

    - name: trivy
      image: aquasec/trivy:latest
      command:
        - cat
      tty: true

    - name: dockle
      image: goodwithtech/dockle:v0.4.15
      command:
        - cat
      tty: true

  volumes:
    - name: docker-config
      secret:
        secretName: regcred
        items:
          - key: .dockerconfigjson
            path: config.json
