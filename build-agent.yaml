spec:
  containers:
    - name: maven
      ...

    - name: docker-tools
      ...

    - name: trufflehog
      ...

    - name: licensefinder
      ...

    - name: kaniko
      image: gcr.io/kaniko-project/executor:latest
      command:
        - /busybox/cat
      tty: true
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker

  volumes:
    - name: m2
      hostPath:
        path: /tmp/.m2/

    - name: docker-sock
      hostPath:
        path: /var/run

    - name: trivycache
      hostPath:
        path: /tmp/trivycache/

    - name: docker-config
      secret:
        secretName: regcred
